<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="container">
        <h1>Smart  Expense  Tracker</h1>
        <p class="subtitle">Manage your daily expenses easily</p>
          <div class="card">
            <h2>Add  Expense</h2>
            <select id="category">
            <option value="Food">Food</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Travelling">Travelling</option>
            <option value="Books">Books</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="expenseName" placeholder="Expense Name">
            <input type="number" id="amount" placeholder="Amount">
            <div class="container1">
            <input type="number" id="date" placeholder="Date">
            <input type="number" id="month" placeholder="Month">
            <input type="number" id="year" placeholder="Year">
           </div>
           <button>Save Expense</button>
            </div>
             <div class="card">
            <h2>Latest Expenses</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expenseList"></tbody>
            </table>
              <button>Show All Expenses</button>
        </div>
        <div class="cardsummary">
                    <div class="card1">
            <h2>Total Expenses</h2>
            <h2 id="totalExpense">₹0</h2>
        </div>
         <div class="card1">
            <h2>Check Budget</h2>
            <button>Check Budget</button>
        </div>
         <div class="card1">
            <h2>Expense Chart</h2>
            <div class="expensechart"></div>
        </div>
        <div class="card2">
            <h2>Category Report</h2>
            <select id="category">
            <option value="Food">Food</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Travelling">Travelling</option>
            <option value="Books">Books</option>
            <option value="Other">Other</option>
             <option value="All">All</option>
        </select>
            <button>Show Category Report</button>
        </div>
        <div class="card2">
            <h2>Reports</h2>
            <button>Weekly Report</button>
            <button>Monthly Report</button>
            <button>Yearly Report</button>
        </div>
         </div>
    </div>
      </body>
      </html>
